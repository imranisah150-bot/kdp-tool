<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PublishAI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #0f0f1a; color: #fff; min-height: 100vh; }
    .header { background: #1a1a2e; padding: 20px; text-align: center; border-bottom: 2px solid #6c63ff; }
    .header h1 { color: #6c63ff; font-size: 28px; }
    .header p { color: #aaa; margin-top: 5px; }
    .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
    .card { background: #1a1a2e; border-radius: 12px; padding: 30px; margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; color: #aaa; font-size: 14px; }
    input, select, textarea { width: 100%; padding: 12px; background: #0f0f1a; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 14px; margin-bottom: 16px; }
    input:focus, select:focus { outline: none; border-color: #6c63ff; }
    .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    button { padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; transition: all 0.2s; }
    .btn-primary { background: #6c63ff; color: #fff; }
    .btn-secondary { background: #1f2b4a; color: #6c63ff; border: 1px solid #6c63ff; }
    button:hover { opacity: 0.85; transform: translateY(-1px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .result-box { background: #0f0f1a; border: 1px solid #333; border-radius: 8px; padding: 20px; margin-top: 20px; min-height: 150px; white-space: pre-wrap; line-height: 1.6; color: #ddd; display: none; }
    .loading { text-align: center; color: #6c63ff; padding: 20px; display: none; }
    .copy-btn { background: #28a745; color: white; padding: 8px 16px; border-radius: 6px; font-size: 12px; margin-top: 10px; display: none; }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab { padding: 10px 20px; border-radius: 8px; cursor: pointer; background: #1a1a2e; border: 1px solid #333; color: #aaa; font-size: 14px; }
    .tab.active { background: #6c63ff; color: white; border-color: #6c63ff; }
  </style>
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <div class="header">
    <h1>✍️ PublishAI</h1>
    <p>AI-powered writing tools for every author & publisher</p>
  </div>

  <div class="container">
    <div class="card">
      <label>Book Title / Topic</label>
      <input type="text" id="bookTitle" placeholder="e.g. How to Start a Dropshipping Business" />

      <label>Genre / Category</label>
      <select id="genre">
        <option>Business & Money</option>
        <option>Self Help</option>
        <option>Health & Fitness</option>
        <option>Cookbooks</option>
        <option>Fiction - Thriller</option>
        <option>Fiction - Romance</option>
        <option>Fiction - Fantasy</option>
        <option>Children's Books</option>
        <option>Biographies</option>
        <option>History</option>
      </select>

      <label>Keywords (comma separated)</label>
      <input type="text" id="keywords" placeholder="e.g. passive income, make money online, beginners" />

      <div class="tabs">
        <div class="tab active" onclick="setTab('description', this)">📝 Book Description</div>
        <div class="tab" onclick="setTab('title', this)">💡 Title Ideas</div>
        <div class="tab" onclick="setTab('keywords', this)">🔍 Keywords</div>
        <div class="tab" onclick="setTab('backcover', this)">📖 Back Cover</div>
      </div>

      <button class="btn-primary" onclick="generate()" id="generateBtn" style="width:100%">✨ Generate with AI</button>

      <div class="loading" id="loading">⏳ Generating... please wait</div>
      <div class="result-box" id="result"></div>
      <button class="copy-btn" id="copyBtn" onclick="copyResult()">📋 Copy to Clipboard</button>
    </div>
  </div>

  <script>
    let currentTab = 'description';

    function setTab(tab, el) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
    }

    async function generate() {
      const bookTitle = document.getElementById('bookTitle').value.trim();
      const genre = document.getElementById('genre').value;
      const keywords = document.getElementById('keywords').value.trim();

      if (!bookTitle) { alert('Please enter a book title or topic!'); return; }

      const btn = document.getElementById('generateBtn');
      const loading = document.getElementById('loading');
      const result = document.getElementById('result');
      const copyBtn = document.getElementById('copyBtn');

      btn.disabled = true;
      loading.style.display = 'block';
      result.style.display = 'none';
      copyBtn.style.display = 'none';

      try {
        const response = await fetch('/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ type: currentTab, bookTitle, genre, keywords })
        });

        const data = await response.json();
        result.textContent = data.result;
        result.style.display = 'block';
        copyBtn.style.display = 'inline-block';
      } catch (err) {
        result.textContent = 'Error generating content. Please try again.';
        result.style.display = 'block';
      }

      btn.disabled = false;
      loading.style.display = 'none';
    }

    function copyResult() {
      navigator.clipboard.writeText(document.getElementById('result').textContent);
      document.getElementById('copyBtn').textContent = '✅ Copied!';
      setTimeout(() => document.getElementById('copyBtn').textContent = '📋 Copy to Clipboard', 2000);
    }
  </script>
</body>
</html>
